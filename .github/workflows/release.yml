name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        echo "Tests would run here"
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          README.md
          LICENSE
          requirements.txt
        body: |
          ## 🎉 Z5-WeChat-SOP v1.0.0 发布
          
          ### ✨ 新特性
          - 4 代理流水线（采集→编辑→审核→发布）
          - 3 层审核机制（数据校验 + 来源核实 + 内容审核）
          - 智能交互模式（全自动/交互/分步）
          - 视觉 AI 配图（封面 + 内文 3-6 张）
          - 学习机制（人工修改学习 + Playbook 自动更新）
          - 效果复盘（数据分析 + 优化建议）
          
          ### 📦 安装
          ```bash
          git clone https://github.com/your-org/Z5-WeChat-SOP.git
          cd Z5-WeChat-SOP
          pip install -r requirements.txt
          ```
          
          ### 🚀 快速开始
          ```bash
          python3 scripts/main.py --client demo --mode auto
          ```
          
          ### 📖 文档
          详见 [README.md](README.md) 和 [index.html](index.html)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
